name: Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 AM UTC = 8:00 AM CET
  workflow_dispatch: {}   # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - name: Run scrapers
        run: npx tsx scripts/scrape-agendas.ts

      - name: Commit if changed
        run: |
          git config user.name "Berry Bot"
          git config user.email "berry@berrykids.nl"
          git add src/data/scraped-events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🍓 Daily scrape: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
